name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Extract release notes from CHANGELOG.md
        id: changelog
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION_NUM="${VERSION#v}"
          NOTES=$(awk -v ver="## [${VERSION_NUM}]" 'index($0, ver " ")==1{found=1; next} /^## \[/{if(found) exit} found{print}' CHANGELOG.md)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Sync npm version to git tag
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION_NUM="${VERSION#v}"
          # Update root package.json
          npm version "${VERSION_NUM}" --no-git-tag-version --allow-same-version
          # Update each platform sub-package
          for dir in npm/darwin-arm64 npm/darwin-x64 npm/linux-x64 npm/linux-arm64 npm/windows-x64; do
            (cd "${dir}" && npm version "${VERSION_NUM}" --no-git-tag-version --allow-same-version)
          done
          # Keep optionalDependencies in sync with the new version
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const ver = '${VERSION_NUM}';
            for (const k of Object.keys(pkg.optionalDependencies)) {
              pkg.optionalDependencies[k] = ver;
            }
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Build release binaries
        run: |
          chmod +x scripts/release.sh
          ./scripts/release.sh ${{ github.ref_name }}

      - name: Verify version injection
        run: |
          VERSION="${{ github.ref_name }}"
          BINARY="dist/inngest-${VERSION}-linux-amd64"
          ARCHIVE="dist/inngest-cli-${VERSION}-linux-amd64.tar.gz"
          tar -xzf "${ARCHIVE}" -C dist
          REPORTED=$("${BINARY}" version -o json | node -e \
            "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>console.log(JSON.parse(s).version))")
          echo "Built binary reports version: ${REPORTED}"
          if [ "${REPORTED}" != "${VERSION}" ]; then
            echo "Error: version injection failed — binary reports '${REPORTED}', expected '${VERSION}'" >&2
            exit 1
          fi
          rm "${BINARY}"

      # npm access — IMPORTANT: `--access restricted` (used below and set as `publishConfig.access`
      # in all six package.json files) publishes the scoped @coastal-programs/* packages as
      # PRIVATE. Private scoped packages require the npm org to be on a PAID plan; on a free plan
      # `npm publish` fails with E402 (Payment Required). The 0.2.2 release temporarily switched
      # to `--access public` as a free-plan workaround (see CHANGELOG.md). The org is now on a
      # paid plan, so the restricted (private) publishes below succeed. If the org ever reverts
      # to a free plan, change both `npm publish` commands to `--access public` and set
      # `publishConfig.access` to "public" in all six package.json files.
      - name: Publish platform sub-packages to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for dir in npm/darwin-arm64 npm/darwin-x64 npm/linux-x64 npm/linux-arm64 npm/windows-x64; do
            echo "Publishing ${dir}..."
            (cd "${dir}" && npm publish --access restricted)
          done

      - name: Publish root package to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access restricted

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body: ${{ steps.changelog.outputs.notes }}
