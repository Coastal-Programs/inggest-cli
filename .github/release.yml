changelog:
  exclude:
    labels:
      - ignore-for-release
    authors:
      - dependabot[bot]
  categories:
    - title: "Breaking Changes"
      labels:
        - breaking-change
        - semver-major
    - title: "New Features"
      labels:
        - enhancement
        - semver-minor
    - title: "Bug Fixes"
      labels:
        - bug
    - title: "Other Changes"
      labels:
        - "*"
